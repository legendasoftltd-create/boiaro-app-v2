  flutter_launcher_icons: ^0.14.3
  flutter_lints:
  image: ^4.5.4
  lints:
  flutter_test:
    sdk: flutter


flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  web:
    generate: true
  image_path: 'assets/images/app_launcher_icon.png'
  adaptive_icon_background: '#46764e'
  adaptive_icon_foreground: 'assets/images/adaptive_foreground_icon.png'


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/

  fonts:
    - family: 'SF Pro Display'
      fonts:
        - asset: assets/fonts/regular.ttf
        - asset: assets/fonts/medium.ttf
          weight: 500
        - asset: assets/fonts/semibold.ttf
          weight: 600
        - asset: assets/fonts/bold.ttf
          weight: 700

    - family: HomeBottomAiBookFill
      fonts:
        - asset: assets/fonts/HomeBottomAiBookFill.ttf

    - family: AdorshoLipi
      fonts:
        - asset: assets/fonts/adorsho_lipi.ttf

    - family: LikhanNormal
      fonts:
        - asset: assets/fonts/likhan_normal.ttf

    - family: Nikosh
      fonts:
        - asset: assets/fonts/nikosh.ttf

    - family: NotoSerifBengali
      fonts:
        - asset: assets/fonts/NotoSerifBengali.ttf

    - family: SolaimanLipi
      fonts:
        - asset: assets/fonts/SolaimanLipi.ttf


  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
